<!DOCTYPE html>
<html>
    <head>
        <title>Image Hover Effect</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        img{
            width:400px;
            border-radius:15px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.3);
            transition:0.4s;
        }
        img:hover{
            transform:scale(1.1);
        }
    </style>
    <body>
        <div class="image-container">
            <img src="image.jpg" alt="Sample Image">
        </div>
    </body>
</html>
