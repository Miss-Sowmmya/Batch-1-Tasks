<!DOCTYPE html>
<html>
<head>
    <title>Sticky Navbar</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        nav{
            position:sticky;
            top:0;
            background:#333;
            padding:15px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-right:20px;
        }

        .content{
            padding:20px;
            height:1500px;
        }

    </style>
</head>
<body>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="content">
    <h2>Sticky Navigation Bar</h2>

    <p>Scroll down and the navbar stays at the top.</p>

    <p>Lorem ipsum dolor sit amet...</p>
</div>

</body>
</html>
