<!DOCTYPE html>
<html>
<head>
    <title>Blockquote</title>

    <style>
        body{
            font-family:Arial;
            padding:40px;
        }

        blockquote{
            border-left:5px solid steelblue;
            padding-left:15px;
            font-style:italic;
            color:#555;
            background:#f5f5f5;
            padding:15px;
        }
    </style>
</head>
<body>

<blockquote>
    Success is the sum of small efforts repeated day in and day out.
</blockquote>

</body>
</html>
