<!DOCTYPE html>
<html>
<head>
    <title>Badge Component</title>

    <style>

        body{
            font-family:Arial;
            padding:40px;
        }

        .badge{
            padding:8px 15px;
            border-radius:20px;
            color:white;
            font-weight:bold;
            margin-right:10px;
        }

        .success{
            background:green;
        }

        .warning{
            background:orange;
        }

        .error{
            background:red;
        }

    </style>
</head>
<body>

<span class="badge success">Success</span>

<span class="badge warning">Warning</span>

<span class="badge error">Error</span>

</body>
</html>
